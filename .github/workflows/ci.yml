name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        mode: [standard, embed, hybrid]
        include:
          - mode: standard
            cmake-flags: ""
          - mode: embed
            cmake-flags: "-DERYX_EMBED=ON"
          - mode: hybrid
            cmake-flags: "-DERYX_HYBRID=ON"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.mode }} (${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libwayland-dev libdecor-0-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('runtime.cmake', 'CMakeLists.txt', 'modules_native.cmake', 'vendor/*.cmake') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=23 ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eryx-${{ matrix.mode }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}
          path: |
            build/eryx${{ runner.os == 'Windows' && '.exe' || '' }}
            build/EryxShared${{ runner.os == 'Windows' && '.dll' || '.so' }}
            build/modules/
          if-no-files-found: ignore
